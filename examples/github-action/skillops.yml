name: SkillOps

on:
  pull_request:

jobs:
  scan:
    name: Scan AI agent instructions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run SkillOps scan
        run: npx @mrtykdmr/skillops scan .

      - name: Generate SkillOps JSON report
        run: npx @mrtykdmr/skillops scan . --output skillops-report.json
