name: SkillOps

on:
  pull_request:

jobs:
  scan:
    name: Scan AI agent instructions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build project
        run: corepack pnpm build

      - name: Run SkillOps scan
        run: corepack pnpm --filter @skillops/cli skillops scan

      - name: Generate SkillOps JSON report
        run: corepack pnpm --filter @skillops/cli skillops scan --output skillops-report.json
